name: Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build and verify
        run: ./gradlew lintDebug testDebugUnitTest assembleDebug --no-daemon
      - name: Name APK
        run: cp app/build/outputs/apk/debug/app-debug.apk LinguaTycoon-${GITHUB_REF_NAME}.apk
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: LinguaTycoon-APK
          path: LinguaTycoon-${{ github.ref_name }}.apk
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "LinguaTycoon-${GITHUB_REF_NAME}.apk" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "LinguaTycoon-${GITHUB_REF_NAME}.apk" --generate-notes --title "Lingua Tycoon $GITHUB_REF_NAME"
          fi
